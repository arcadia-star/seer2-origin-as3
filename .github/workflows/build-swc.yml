# .github/workflows/build-swc.yml
name: Build Seer2CoreDLL SWC

on:
  workflow_dispatch:        # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ---------- 安装 AIR SDK Manager ----------
      - name: Download AIR SDK Manager installer
        shell: pwsh
        run: |
          $url = "https://github.com/airsdk/airsdkmanager-releases/releases/download/3.0.5/AIRSDKManager_win_3.0.5.exe"
          $out = "$env:RUNNER_TEMP\AIRSDKManager.exe"
          Write-Host "Downloading AIR SDK Manager from $url ..."
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Write-Host "Download completed."

      - name: Install AIR SDK Manager silently
        shell: pwsh
        run: |
          $installer = "$env:RUNNER_TEMP\AIRSDKManager.exe"
          $installPath = "C:\AIRSDK"
          Write-Host "Installing AIR SDK Manager to $installPath ..."
          Start-Process -FilePath $installer -ArgumentList "/S /D=$installPath" -Wait -NoNewWindow
          Write-Host "Installation finished."

      - name: Install AIR SDK (version 51.3.1.2) using Manager
        shell: pwsh
        run: |
          $manager = "C:\AIRSDK\bin\AIRSDKManager.exe"
          $sdkVersion = "51.3.1.2"
          Write-Host "Installing AIR SDK version $sdkVersion ..."
          & $manager -install $sdkVersion
          # 管理器会将 SDK 安装到 C:\AIRSDK\$sdkVersion
          $sdkPath = "C:\AIRSDK\$sdkVersion"
          if (Test-Path $sdkPath) {
            Write-Host "AIR SDK installed at $sdkPath"
            $binPath = "$sdkPath\bin"
            Write-Host "Adding $binPath to GITHUB_PATH"
            Add-Content $env:GITHUB_PATH $binPath
            # 可选：设置 AIR_HOME 环境变量
            Write-Host "AIR_HOME=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Error "AIR SDK installation failed: $sdkPath not found"
            exit 1
          }

      - name: Verify compc availability
        shell: cmd
        run: |
          where compc
          compc -version

      # ---------- 编译 SWC ----------
      - name: Compile SWC with compc
        shell: cmd
        run: |
          compc -target-player=32.0 ^
            -source-path src ^
            -library-path lib/as3corelib.swc ^
            -library-path lib/greensock-taomee.swc ^
            -library-path lib/textLayout.swc ^
            -output out/Seer2CoreDLL.swc ^
            -include-sources src ^
            -warnings=false

      # ---------- 运行 Python 后处理脚本 ----------
      - name: Run Python post-processing script
        shell: pwsh
        run: |
          cd _scripts
          python build-seer2-core-dll.py

      # ---------- 上传产物（可选）----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Seer2CoreDLL-output
          path: |
            out/Seer2CoreDLL.swc
            out/Seer2CoreDLL.swf
