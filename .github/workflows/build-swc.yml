# .github/workflows/build-swc.yml
name: Build Seer2CoreDLL SWC

on:
  workflow_dispatch:        # 手动触发
  push:
    branches:
      - main
    paths:
      - 'src/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 使用正确的 Action 安装 Adobe AIR SDK
      - name: Setup Adobe AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "51.3.1.2"      # 可替换为其他版本，如 "50.0.1.1" 或 "32.0"
          accept-license: true          # 必须接受许可

      # 编译 SWC、DLL
      - name: Compile SWC with compc
        shell: bash
        run: |
          current_time=$(date +'%Y-%m-%d_%H:%M:%S')  
          sed -i "s/#BuildVersion#/${current_time}/g" "src/seer2/next/donotmodify/BuildVersion.as"
          ./build.sh

      # 上传产物（可选）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Seer2CoreDLL-output
          path: |
            out/Seer2CoreDLL.swc
            out/Seer2CoreDLL.swf

      # 上传改服
      - name: Install filebrowser-client
        run: pip install filebrowser-client
      - name: Upload using filebrowser-client
        if: github.repository == 'arcadia-star/seer2-origin-as3'
        env:
          FB_URL: ${{ secrets.FB_URL }}
          FB_USERNAME: ${{ secrets.FB_USERNAME }}
          FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
        shell: pwsh
        run: |
          filebrowser-client upload out/Seer2CoreDLL.swf /dll/Seer2CoreDLL.swf `
            --host $env:FB_URL `
            --username $env:FB_USERNAME `
            --password $env:FB_PASSWORD `
            --override
