# .github/workflows/build-swc.yml
name: Build Seer2CoreDLL SWC

on:
  workflow_dispatch:        # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ---------- 缓存 Adobe AIR SDK ----------
      # 注意：为了缓存 key 能随 AIR 版本自动变化，请在仓库根目录创建 .air-version 文件，内容为版本号（例如 51.3.1.2）
      # 如果不想要该文件，可以把 key 中的 hashFiles 替换为固定版本字符串，例如：${{ runner.os }}-adobe-air-sdk-51.3.1.2
      - name: Cache Adobe AIR SDK
        uses: actions/cache@v4
        with:
          path: ~/adobe-air-sdk
          key: ${{ runner.os }}-adobe-air-sdk-${{ hashFiles('.air-version') }}
          restore-keys: |
            ${{ runner.os }}-adobe-air-sdk-       

      # 使用正确的 Action 安装 Adobe AIR SDK
      - name: Setup Adobe AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "51.3.1.2"      # 可替换为其他版本，如 "50.0.1.1" 或 "32.0"
          accept-license: true          # 必须接受许可

      # 编译 SWC
      - name: Compile SWC with compc
        shell: cmd
        run: |
          compc -target-player=32.0 ^
            -source-path src ^
            -library-path lib/as3corelib.swc ^
            -library-path lib/greensock-taomee.swc ^
            -library-path lib/textLayout.swc ^
            -output out/Seer2CoreDLL.swc ^
            -include-sources src ^
            -warnings=false

      # 运行 Python 后处理脚本
      - name: Run Python post-processing script
        shell: pwsh
        run: |
          cd _scripts
          python build-seer2-core-dll.py

      # 上传产物（可选）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Seer2CoreDLL-output
          path: |
            out/Seer2CoreDLL.swc
            out/Seer2CoreDLL.swf

      # 上传改服
      - name: Upload to File Browser (PowerShell)
        env:
          FB_URL: ${{ secrets.FB_URL }}           # 例如 https://your-filebrowser.com
          FB_USERNAME: ${{ secrets.FB_USERNAME }}
          FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
        shell: bash   # 使用 bash 以兼容 curl 语法（GitHub Actions windows-latest 自带 bash）
        run: |
          # 登录并获取 cookie 和 XSRF token
          LOGIN_RESPONSE=$(curl -s -i -X POST "$FB_URL/api/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$FB_USERNAME\", \"password\":\"$FB_PASSWORD\"}")
        
          COOKIE=$(echo "$LOGIN_RESPONSE" | grep -i "set-cookie" | grep "http.sess=" | cut -d' ' -f2 | cut -d';' -f1)
          XSRF_TOKEN=$(echo "$LOGIN_RESPONSE" | grep -i "set-cookie" | grep "XSRF-TOKEN=" | cut -d' ' -f2 | cut -d';' -f1 | cut -d'=' -f2)

          # 上传文件到 dll/ 目录（如果目录不存在，File Browser 会自动创建）
          curl -X POST "$FB_URL/api/resources/dll/Seer2CoreDLL.swf" \
            -H "Cookie: $COOKIE; XSRF-TOKEN=$XSRF_TOKEN" \
            -H "X-XSRF-TOKEN: $XSRF_TOKEN" \
            -F "file=@./out/Seer2CoreDLL.swf"
