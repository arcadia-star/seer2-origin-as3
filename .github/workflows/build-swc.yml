# .github/workflows/build-swc.yml
name: Build Seer2CoreDLL SWC

on:
  workflow_dispatch:        # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ---------- 缓存 Adobe AIR SDK ----------
      # 注意：为了缓存 key 能随 AIR 版本自动变化，请在仓库根目录创建 .air-version 文件，内容为版本号（例如 51.3.1.2）
      # 如果不想要该文件，可以把 key 中的 hashFiles 替换为固定版本字符串，例如：${{ runner.os }}-adobe-air-sdk-51.3.1.2
      - name: Cache Adobe AIR SDK
        uses: actions/cache@v4
        with:
          path: ~/adobe-air-sdk
          key: ${{ runner.os }}-adobe-air-sdk-51.3.1.2
          restore-keys: |
            ${{ runner.os }}-adobe-air-sdk-       

      # 使用正确的 Action 安装 Adobe AIR SDK
      - name: Setup Adobe AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "51.3.1.2"      # 可替换为其他版本，如 "50.0.1.1" 或 "32.0"
          accept-license: true          # 必须接受许可

      # 编译 SWC
      - name: Compile SWC with compc
        shell: cmd
        run: |
          compc -target-player=32.0 ^
            -source-path src ^
            -library-path lib/as3corelib.swc ^
            -library-path lib/greensock-taomee.swc ^
            -library-path lib/textLayout.swc ^
            -output out/Seer2CoreDLL.swc ^
            -include-sources src ^
            -warnings=false

      # 运行 Python 后处理脚本
      - name: Run Python post-processing script
        shell: pwsh
        run: |
          cd _scripts
          python build-seer2-core-dll.py

      # 上传产物（可选）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Seer2CoreDLL-output
          path: |
            out/Seer2CoreDLL.swc
            out/Seer2CoreDLL.swf

      # 上传改服
      - name: Upload to File Browser (PowerShell)
        env:
          FB_URL: ${{ secrets.FB_URL }}
          FB_USERNAME: ${{ secrets.FB_USERNAME }}
          FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
        shell: pwsh
        run: |
          # Login
          $loginBody = @{username=$env:FB_USERNAME; password=$env:FB_PASSWORD} | ConvertTo-Json
          $loginResponse = Invoke-WebRequest -Uri "$env:FB_URL/api/login" -Method Post -Body $loginBody -ContentType "application/json" -SessionVariable fbSession
          $xsrfToken = ($loginResponse.Headers.'Set-Cookie' | Where-Object { $_ -like "XSRF-TOKEN=*" }) -replace 'XSRF-TOKEN=([^;]+);.*', '$1'
          
          # Upload
          $filePath = Resolve-Path "./out/Seer2CoreDLL.swf"
          $uploadUri = "$env:FB_URL/api/resources/dll/Seer2CoreDLL.swf"
          $form = @{ file = Get-Item $filePath }
          Invoke-WebRequest -Uri $uploadUri -Method Post -Form $form -WebSession $fbSession -Headers @{ "X-XSRF-TOKEN" = $xsrfToken }
