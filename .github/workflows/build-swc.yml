# .github/workflows/build-swc.yml
name: Build Seer2CoreDLL SWC

on:
  workflow_dispatch:        # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 使用现成的 Action 安装 Adobe AIR SDK
      - name: Setup Adobe AIR SDK
        uses: WillieCubed/setup-adobe-air-sdk@v1
        with:
          version: '51.3.1.2'          # 可替换为你需要的版本，如 '32.0' 或 '50.2'
          install-playerglobal: false   # 若不需要 playerglobal 可设为 false

      # 验证 compc 是否可用
      - name: Verify compc
        shell: cmd
        run: |
          where compc
          compc -version

      # 编译 SWC
      - name: Compile SWC with compc
        shell: cmd
        run: |
          compc -target-player=32.0 ^
            -source-path src ^
            -library-path lib/as3corelib.swc ^
            -library-path lib/greensock-taomee.swc ^
            -library-path lib/textLayout.swc ^
            -output out/Seer2CoreDLL.swc ^
            -include-sources src ^
            -warnings=false

      # 运行 Python 后处理脚本
      - name: Run Python post-processing script
        shell: pwsh
        run: |
          cd _scripts
          python build-seer2-core-dll.py

      # 上传产物（可选）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Seer2CoreDLL-output
          path: |
            out/Seer2CoreDLL.swc
            out/Seer2CoreDLL.swf
